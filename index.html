<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Github Issue Tracker</title>
  <!-- tailwind and daisyUi -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- fontawsame -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- css -->
  <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
  <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl mx-auto mt-20">
    <div class="card-body">
      <div class="flex flex-col items-center justify-center space-y-3 ">
        <img src="./assets/github-logo.png" alt="github-logo.png">
        <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
        <p class="font-semibold text-neutral-400">Sign in to manage your issues</p>
      </div>
      <fieldset class="fieldset">
        <label class="label font-bold">UserName</label>
        <input id="UserName" type="text" class="input" placeholder="Enter UserName" />
        <label class="label font-bold">Password</label>
        <input id="password" type="password" class="input" placeholder="Password" />
        <button id="Login-btn" class="btn btn-primary mt-4 w-full">Login</button>
      </fieldset>
      <div class="flex flex-col justify-center items-center space-y-3">
        <h2 class="font-bold">QR</h2>
        <p class="text-neutral-500">Demo Credentials:</p>
      </div>
      <div class="flex flex-col justify-center items-center">
        <h2><span class="font-bold">Username:</span> <span> admin</span></h2>
        <h2><span class="font-bold">Password: </span> <span> admin123</span></h2>
      </div>
    </div>
  </div>
  <script src="./js/login.js"></script>
</body>

</html>
