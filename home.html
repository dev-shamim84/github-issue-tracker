<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <!-- tailwind and daisyUi -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- fontawsame -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- css -->
  <link rel="stylesheet" href="./styles/style.css" />
</head>

<body class="bg-[#F8FAFC]">
  <header class="bg-[#E9E9E9] py-3">
    <div class="container mx-auto px-4">
      <div class="flex flex-col gap-3 md:flex-row justify-between items-center">
        <div>
          <h2 class="flex gap-2 items-center">
            <img class="w-[40px]" src="./assets/github-logo.png" alt="" /><span class="font-bold text-xl">GitHub Issues
              Tracker</span>
          </h2>
        </div>
        <div>
          <div class="join">
            <div>
              <label class="input validator join-item">
                <input id="search-input" class="border-none focus:outline-none" type="text"
                  placeholder="Search issues..." />
              </label>
            </div>
            <button id="search-btn" class="btn btn-primary join-item">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>
  <section class="py-10">
    <div class="container mx-auto px-4 lg:px-10">
      <div class="bg-gray-100/20 p-4 shadow rounded">
        <div class="flex flex-wrap gap-4">
          <button onclick="activeButton('all')" id="all"
            class="py-2 font-semibold px-11 bg-blue-700 text-white cursor-pointer rounded">
            All
          </button>
          <button onclick="activeButton('open')" id="open"
            class="py-2 font-semibold bg-white text-black px-11 cursor-pointer rounded">
            Open
          </button>
          <button onclick="activeButton('close')" id="close"
            class="py-2 font-semibold px-11 bg-white text-black cursor-pointer rounded">
            Close
          </button>
        </div>
      </div>
    </div>
  </section>
  <section>
    <div class="container mx-auto px-10">
      <div class="bg-gray-100/20 p-2 flex flex-col md:flex-row justify-between items-center shadow">
        <div class="flex gap-2 items-center">
          <div><img src="./assets/Aperture.png" alt="" /></div>
          <div>
            <h2 class="font-bold text-xl"><span id="issue"></span> Issues</h2>
            <p class="text-neutral-500">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="">
          <span>Open</span>
          <span>Close</span>
        </div>
      </div>
    </div>
  </section>
  <!-- card section -->
  <section>
    <div class="container mx-auto px-4 lg:px-10">
      <div id="loading" class="flex justify-center items-center hidden">
        <span class="loading loading-bars loading-xl"></span>
      </div>

      <div id="card-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 bg-gray-100/20 lg:px-10 lg:py-5 shadow-xl rounded-[10px] mt-5">
        <!-- loader -->
      </div>
    </div>
  </section>
  <!-- Open the modal using ID.showModal() method -->
  <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
  <dialog id="details_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <div id="modal-container"></div>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn btn-primary">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  <script src="./js/data.js"></script>
</body>

</html>
